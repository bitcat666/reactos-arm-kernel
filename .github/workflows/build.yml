name: Build ReactOS ARM Kernel

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install ARM GCC
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq gcc-arm-none-eabi 2>&1 | tail -1
        arm-none-eabi-gcc --version | head -1

    - name: Clone ReactOS
      run: |
        git clone --depth 1 https://github.com/bitcat666/reactos.git /tmp/reactos 2>&1 | tail -2
        ls /tmp/reactos/CMakeLists.txt && echo "OK"

    - name: Build ARM HAL
      run: |
        cd /tmp/reactos
        mkdir build && cd build
        cmake .. -DARCH=arm -GNinja           -DCMAKE_TOOLCHAIN_FILE=../toolchain-gcc.cmake           -DCMAKE_C_COMPILER=arm-none-eabi-gcc           -DMINGW_TOOLCHAIN_PREFIX=""           -DCMAKE_C_FLAGS="-Wno-error" 2>&1 | tail -5
        ninja hal 2>&1 | tail -5
        find . -name "*.dll" -o -name "*.a" | head -10

    - name: Build ARM Kernel
      run: |
        cd /tmp/reactos/build
        ninja ntoskrnl 2>&1 | tail -5
        find . -name "ntoskrnl*" -o -name "*.sys" | head -10

    - uses: actions/upload-artifact@v4
      with:
        name: arm-hal-kernel
        path: /tmp/reactos/build/**/*
