name: Build ARM Windows 2003 (Native MS Toolchain)

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Download Win2K3 ARM source
      shell: pwsh
      run: |
        $token = "${{ secrets.GITHUB_TOKEN }}"
        $headers = @{ Authorization = "Bearer $token" }
        $release = Invoke-RestMethod -Uri "https://api.github.com/repos/bitcat666/reactos-arm-kernel/releases/latest" -Headers $headers
        # For now, just verify we have the right setup
        Write-Host "Windows CI ready for ARM cross-compilation"
        Write-Host "Need: Win2K3 source tree + ReactOS ARM HAL/KE + clarm.exe"
    
    - name: Verify ARM compiler
      shell: cmd
      run: |
        echo The ARM compiler (clarm.exe) runs on Windows x86
        echo Need to upload Win2K3 tools + ReactOS ARM sources as release
