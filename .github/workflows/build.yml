name: Test Win2K3 ARM Compiler

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Download ARM tools
      shell: pwsh
      run: |
        $repo = "${{ github.repository }}"
        $token = "${{ secrets.GITHUB_TOKEN }}"
        $headers = @{ Authorization = "Bearer $token" }
        $release = Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases/tags/test" -Headers $headers
        $asset = $release.assets | Where-Object { $_.name -like "arm_test*" }
        Invoke-WebRequest -Uri $asset.browser_download_url -Headers $headers -OutFile "arm_test.7z"
        7z x arm_test.7z -oD:\ -y
        dir D:\arm_test\tools\arm\clarm.exe
    
    - name: Compile ARM test
      shell: cmd
      run: |
        set PATH=D:\arm_test\tools\arm;%PATH%
        cd D:\arm_test
        clarm.exe /c /O1 test.c /Fotest.obj
        echo COMPILE=%ERRORLEVEL%
        dir test.obj
    
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: arm-obj
        path: D:\arm_test\test.obj
