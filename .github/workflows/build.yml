name: Build ARM Windows NT

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install tools
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq cmake ninja-build gcc-arm-none-eabi 2>&1 | tail -1
    
    - name: Clone ReactOS (from fork)
      run: |
        git clone --depth 1 https://github.com/bitcat666/reactos.git /tmp/reactos 2>&1 | tail -3
        ls /tmp/reactos/CMakeLists.txt && echo "✓ ReactOS cloned"

    - name: CMake configure for ARM
      run: |
        cd /tmp/reactos
        mkdir build && cd build
        cmake .. -DARCH=arm -GNinja           -DCMAKE_TOOLCHAIN_FILE=../toolchain-gcc.cmake           -DCMAKE_C_COMPILER=arm-none-eabi-gcc 2>&1 | tail -10

    - name: Build hal + ntoskrnl
      run: |
        cd /tmp/reactos/build
        ninja hal ntoskrnl 2>&1 | tail -20 || true
        echo "=== Artifacts ==="
        find . \( -name "*.dll" -o -name "*.sys" -o -name "ntoskrnl*" \) 2>/dev/null

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: arm-kernel
        path: /tmp/reactos/build/**/*
