name: Build ReactOS ARM NT Kernel

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install ARM cross-compiler
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq gcc-arm-none-eabi 2>&1 | tail -1
        arm-none-eabi-gcc --version | head -1
    
    - name: Build ARM HAL
      run: |
        echo "=== Building ARM HAL ==="
        mkdir -p build/hal
        cd build/hal
        arm-none-eabi-gcc -c -O1 -nostdlib -ffreestanding           -I../../hal/halarm/include           -I../../sdk/include           -I../../sdk/include/psdk           -I../../sdk/include/crt           -I../../include/reactos           -D_NTHALDLL_ -D_NTHAL_ -D_ARM_ -D__arm__           ../../hal/halarm/generic/*.c ../../hal/halarm/versa/*.c 2>&1 | grep -E "error|warning" | head -10
        COUNT=$(ls *.o 2>/dev/null | wc -l)
        echo "HAL: $COUNT objects compiled"
    
    - name: Build ARM Kernel layer
      run: |
        mkdir -p build/ke
        cd build/ke
        arm-none-eabi-gcc -c -O1 -nostdlib -ffreestanding           -I../../ntoskrnl/include           -I../../hal/halarm/include           -I../../sdk/include           -I../../sdk/include/psdk           -I../../sdk/include/crt           -I../../include/reactos           -D_ARM_ -DARM -D__arm__ -D_NTOSKRNL_           ../../ntoskrnl/ke/arm/*.c 2>&1 | grep -E "error|warning" | head -10
        COUNT=$(ls *.o 2>/dev/null | wc -l)
        echo "KE: $COUNT objects compiled"
    
    - name: Show results
      run: |
        echo "=== All ARM objects ==="
        find build -name "*.o" | sort
        echo ""
        find build -name "*.o" | wc -l | xargs echo "Total:"
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: arm-nt-kernel
        path: build/**/*.o
