name: Build ARM Windows NT (ReactOS + Win2K3)

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install tools
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq cmake ninja-build gcc-arm-none-eabi wget 2>&1 | tail -1
    
    - name: Download ReactOS source
      run: |
        cd /tmp
        wget -q --timeout=120 --tries=3           -O reactos.zip           https://github.com/reactos/reactos/archive/v0.4.15.zip
        unzip -q reactos.zip
        mv reactos-* reactos
        ls /tmp/reactos/CMakeLists.txt && echo "✓ ReactOS source"
    
    - name: Configure ARM
      run: |
        cd /tmp/reactos
        mkdir build && cd build
        cmake .. -DARCH=arm -GNinja           -DCMAKE_TOOLCHAIN_FILE=../toolchain-gcc.cmake           -DCMAKE_C_COMPILER=arm-none-eabi-gcc           2>&1 | tail -10
    
    - name: Build HAL + ntoskrnl
      run: |
        cd /tmp/reactos/build
        ninja hal ntoskrnl 2>&1 | tail -20 || true
        echo "=== Build artifacts ==="
        find . -name "*.dll" -o -name "*.a" 2>/dev/null | head -20
        find . -name "ntoskrnl*" -o -name "hal.dll" 2>/dev/null
    
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: arm-kernel
        path: /tmp/reactos/build/**/*
