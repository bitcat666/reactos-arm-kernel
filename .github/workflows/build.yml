name: Build ReactOS ARM via CMake

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install deps
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq cmake gcc-arm-none-eabi mingw-w64-tools ninja-build 2>&1 | tail -2
    
    - name: Clone ReactOS
      run: |
        git clone --depth 1 https://github.com/reactos/reactos.git /tmp/reactos 2>&1 | tail -3
        echo "ReactOS cloned"
        ls /tmp/reactos/sdk/include/crt/excpt.h && echo "Headers OK"
    
    - name: Configure for ARM
      run: |
        cd /tmp/reactos
        mkdir build && cd build
        cmake .. -DARCH=arm -GNinja           -DCMAKE_TOOLCHAIN_FILE=../toolchain-gcc.cmake           -DCMAKE_C_COMPILER=arm-none-eabi-gcc           2>&1 | tail -10
    
    - name: Build HAL + Kernel
      run: |
        cd /tmp/reactos/build
        ninja hal ntoskrnl 2>&1 | tail -10 || echo "Partial build, checking outputs..."
        echo "=== Built files ==="
        find . -name "*.o" -o -name "*.a" -o -name "*.dll" -o -name "*.sys" 2>/dev/null | head -20
    
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: arm-build
        path: /tmp/reactos/build/**/*
